<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Clock</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" id="metaThemeColor" content="#1a1a2e" />
<style>
/* ── THEME TOKENS ─────────────────────────────────────── */

:root, [data-theme="dark"] {
  --bg:         #1a1a2e;
  --bg2:        #16213e;
  --card:       #0f3460;
  --accent:     #e94560;
  --text:       #eaeaea;
  --muted:      #8892a4;
  --border:     rgba(255,255,255,0.08);
  --home-bdr:   #4fa3e0;
  --shadow:     0 4px 24px rgba(0,0,0,0.4);
  --badge-bg:   rgba(255,255,255,0.08);
  --input-bg:   rgba(255,255,255,0.07);
  --icon-hover: rgba(255,255,255,0.07);
  --radius:     14px;
}

[data-theme="light"] {
  --bg:         #f0f4f8;
  --bg2:        #ffffff;
  --card:       #ffffff;
  --accent:     #d63251;
  --text:       #1a1a2e;
  --muted:      #6b7280;
  --border:     rgba(0,0,0,0.10);
  --home-bdr:   #2563eb;
  --shadow:     0 4px 20px rgba(0,0,0,0.10);
  --badge-bg:   rgba(0,0,0,0.07);
  --input-bg:   rgba(0,0,0,0.05);
  --icon-hover: rgba(0,0,0,0.06);
}

/* Custom — bg/bg2/card set as inline CSS vars on <html> by JS */
[data-theme="custom"] {
  --accent:     #e94560;
  --text:       #eaeaea;
  --muted:      #9aa3b0;
  --border:     rgba(255,255,255,0.10);
  --home-bdr:   #4fa3e0;
  --shadow:     0 4px 24px rgba(0,0,0,0.45);
  --badge-bg:   rgba(255,255,255,0.10);
  --input-bg:   rgba(255,255,255,0.08);
  --icon-hover: rgba(255,255,255,0.08);
}

/* ── BASE ─────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  transition: background 0.35s, color 0.25s;
}

/* ── HEADER ── */
.app-header {
  text-align: center;
  padding: 32px 20px 8px;
}

.app-title {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1.1;
}

.app-title span { color: var(--accent); }

.app-subtitle {
  font-size: 0.92rem;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.03em;
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 20px;
  flex-wrap: wrap;
}

.toolbar-label {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.btn-group {
  display: flex;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.btn-group button {
  background: none;
  border: none;
  color: var(--muted);
  padding: 7px 13px;
  cursor: pointer;
  font-size: 0.82rem;
  font-family: inherit;
  transition: background 0.18s, color 0.18s;
}

.btn-group button.active { background: var(--accent); color: #fff; }
.btn-group button:not(:last-child) { border-right: 1px solid var(--border); }

/* ── THEME SWITCHER ── */
.theme-switcher {
  display: flex;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.theme-switcher button {
  background: none;
  border: none;
  color: var(--muted);
  padding: 7px 11px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  transition: background 0.18s, color 0.18s;
}

.theme-switcher button.active { background: var(--accent); color: #fff; }
.theme-switcher button:not(:last-child) { border-right: 1px solid var(--border); }

/* ── GRID CONTROLS ── */
.grid-controls {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
}

.grid-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 5px 7px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  transition: background 0.15s, color 0.15s;
}

.grid-btn.active { background: var(--accent); color: #fff; }
.grid-btn svg { width: 16px; height: 16px; fill: currentColor; }

.menu-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 7px 13px;
  cursor: pointer;
  font-size: 1rem;
  transition: background 0.15s;
}

.menu-btn:hover { filter: brightness(1.1); }

/* ── CLOCKS WRAPPER ── */
#clocks-wrapper {
  padding: 10px 20px 40px;
  max-width: 1200px;
  margin: 0 auto;
}

#clocks {
  display: grid;
  gap: 16px;
  transition: grid-template-columns 0.3s ease;
}

#clocks.layout-horizontal { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
#clocks.layout-vertical   { grid-template-columns: 1fr; max-width: 380px; margin: 0 auto; }
#clocks.layout-grid-2     { grid-template-columns: repeat(2, 1fr); }
#clocks.layout-grid-3     { grid-template-columns: repeat(3, 1fr); }
#clocks.layout-grid-4     { grid-template-columns: repeat(4, 1fr); }

/* ── CLOCK CARD ── */
.clock-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px 14px;
  position: relative;
  cursor: grab;
  user-select: none;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s, background 0.3s;
}

.clock-card:active { cursor: grabbing; }

.clock-card.home-card {
  border: 2px solid var(--home-bdr);
  box-shadow: 0 0 0 3px rgba(79,163,224,0.14), var(--shadow);
}

.clock-card.hidden-card { opacity: 0.35; }

.clock-card.dragging {
  transform: scale(1.04);
  box-shadow: 0 14px 40px rgba(0,0,0,0.45);
  z-index: 10;
}

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  gap: 6px;
}

.city-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
  min-width: 0;
}

.city-name {
  font-size: 0.95rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tz-badge {
  font-size: 0.68rem;
  background: var(--badge-bg);
  border-radius: 4px;
  padding: 2px 6px;
  color: var(--muted);
  white-space: nowrap;
}

.home-star { font-size: 0.85rem; flex-shrink: 0; }
.card-actions { display: flex; gap: 4px; flex-shrink: 0; }

.icon-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 5px;
  font-size: 0.85rem;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
}

.icon-btn:hover { color: var(--text); background: var(--icon-hover); }

/* nickname */
.nickname-row { min-height: 22px; margin-bottom: 6px; }

.nickname-display {
  font-size: 0.76rem;
  color: var(--muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.nickname-display:hover { color: var(--text); }
.nickname-editor { display: none; }

.nickname-editor.open {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.nickname-editor input {
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 5px;
  padding: 3px 7px;
  font-size: 0.76rem;
  font-family: inherit;
  width: 130px;
  outline: none;
}

.nickname-editor input:focus { border-color: var(--accent); }
.nick-char-count { font-size: 0.68rem; color: var(--muted); }

.nick-save, .nick-cancel {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 0.72rem;
  cursor: pointer;
  font-family: inherit;
}

.nick-save { border-color: var(--home-bdr); color: var(--home-bdr); }

/* time display */
.time-display {
  font-size: 2.1rem;
  font-weight: 300;
  letter-spacing: 0.03em;
  line-height: 1;
  margin-bottom: 2px;
  font-variant-numeric: tabular-nums;
}

.ampm { font-size: 0.85rem; color: var(--muted); margin-left: 4px; vertical-align: middle; }
.date-display { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
.utc-offset   { font-size: 0.70rem; color: var(--muted); }

.day-icon {
  position: absolute;
  top: 14px; right: 48px;
  font-size: 1.1rem;
  opacity: 0.75;
}

/* ── FLOATING MENU ── */
.float-menu { position: fixed; inset: 0; z-index: 100; display: none; }
.float-menu.open { display: block; }
.float-menu-backdrop { position: absolute; inset: 0; }

.float-menu-panel {
  position: absolute;
  top: 70px; right: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 290px;
  padding: 18px;
  z-index: 101;
  max-height: 85vh;
  overflow-y: auto;
}

.menu-section { margin-bottom: 18px; }
.menu-section:last-child { margin-bottom: 0; }

.menu-section-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 8px;
}

.theme-btn {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  padding: 7px 12px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.83rem;
  text-align: left;
  transition: filter 0.15s;
}

.theme-btn:hover { filter: brightness(1.15); }

.reset-btn {
  width: 100%;
  background: none;
  border: 1px solid rgba(233,69,96,0.35);
  color: var(--accent);
  border-radius: 7px;
  padding: 7px 12px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.83rem;
  margin-top: 6px;
  transition: background 0.15s;
}

.reset-btn:hover { background: rgba(233,69,96,0.08); }

/* ── CARD COLOUR MODAL ── */
.colour-modal {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
}

.colour-modal.open { display: flex; }

.colour-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px; width: 310px;
  box-shadow: var(--shadow);
}

.colour-panel h3 {
  font-family: 'Times New Roman', serif;
  font-size: 0.95rem;
  color: var(--text);
  margin-bottom: 14px;
}

.colour-tabs { display: flex; gap: 6px; margin-bottom: 14px; }

.colour-tab {
  flex: 1; background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 6px; padding: 6px;
  cursor: pointer; font-family: inherit; font-size: 0.82rem;
  transition: all 0.15s;
}

.colour-tab.active { border-color: var(--accent); color: var(--accent); }

.colour-row {
  display: flex; align-items: center;
  gap: 10px; margin-bottom: 10px;
  font-size: 0.82rem; color: var(--muted);
}

.colour-row input[type=color] {
  width: 36px; height: 28px;
  border: none; border-radius: 4px; cursor: pointer; background: none;
}

.direction-btns { display: flex; gap: 4px; flex-wrap: wrap; }

.dir-btn {
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text); border-radius: 5px;
  padding: 4px 9px; cursor: pointer; font-size: 0.85rem;
  transition: all 0.15s;
}

.dir-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.colour-preview {
  width: 100%; height: 36px;
  border-radius: 7px; margin: 10px 0;
  border: 1px solid var(--border);
}

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

.btn-cancel, .btn-apply {
  border: 1px solid var(--border);
  background: none; color: var(--text);
  border-radius: 6px; padding: 6px 16px;
  cursor: pointer; font-family: inherit; font-size: 0.85rem;
}

.btn-apply { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── CUSTOM BG MODAL ── */
.bg-modal {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
}

.bg-modal.open { display: flex; }

.bg-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px; width: 340px;
  box-shadow: var(--shadow);
}

.bg-panel h3 {
  font-family: 'Times New Roman', serif;
  font-size: 1.1rem; color: var(--text);
  margin-bottom: 4px;
}

.bg-panel > p {
  font-size: 0.79rem; color: var(--muted);
  line-height: 1.45; margin-bottom: 16px;
}

.bg-presets {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 16px;
}

.bg-preset {
  width: 34px; height: 34px;
  border-radius: 8px; border: 2px solid transparent;
  cursor: pointer; flex-shrink: 0;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
}

.bg-preset:hover, .bg-preset.selected {
  border-color: var(--accent); transform: scale(1.12);
}

.bg-preset.selected::after {
  content: '✓';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}

.bg-custom-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}

.bg-custom-row label { font-size: 0.82rem; color: var(--muted); flex: 1; }

.bg-custom-row input[type=color] {
  width: 44px; height: 34px;
  border: none; border-radius: 6px;
  cursor: pointer; background: none;
}

.bg-live-preview {
  width: 100%; height: 52px;
  border-radius: 10px; border: 1px solid var(--border);
  margin-bottom: 14px;
  transition: background 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
}

/* ── ADD TIMEZONE ── */
.tz-list {
  max-height: 155px; overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 4px; margin-top: 8px; padding-right: 4px;
}

.tz-list::-webkit-scrollbar { width: 4px; }
.tz-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.tz-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 8px; border-radius: 6px;
  background: var(--input-bg); font-size: 0.8rem;
  cursor: pointer; transition: filter 0.15s;
}

.tz-item:hover { filter: brightness(1.15); }
.tz-item .add-mark { font-size: 1rem; color: var(--home-bdr); }

.tz-name-input {
  background: var(--input-bg);
  border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 5px 9px; font-size: 0.8rem;
  width: 100%; margin-bottom: 6px; font-family: inherit; outline: none;
}

.tz-name-input:focus { border-color: var(--accent); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #2a9d8f; color: #fff;
  padding: 9px 20px; border-radius: 30px;
  font-size: 0.85rem; font-weight: 600;
  opacity: 0; pointer-events: none; z-index: 999;
  transition: transform 0.3s, opacity 0.3s;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  #clocks.layout-grid-3,
  #clocks.layout-grid-4  { grid-template-columns: repeat(2, 1fr); }
  #clocks.layout-grid-2  { grid-template-columns: 1fr; }
  .toolbar { gap: 6px; }
  .app-title { font-size: 1.8rem; }
  .theme-switcher button span { display: none; }
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="app-header">
  <h1 class="app-title">🌐 World <span>Clock</span></h1>
  <p class="app-subtitle">Track live times across your key cities — personalise cards, set colours, and install as an app.</p>
</header>

<!-- ── TOOLBAR ── -->
<div class="toolbar">

  <span class="toolbar-label">Format</span>
  <div class="btn-group">
    <button id="btn-24h" class="active" onclick="setFormat(24)">24h</button>
    <button id="btn-12h"                onclick="setFormat(12)">12h</button>
  </div>

  <span class="toolbar-label">View</span>
  <div class="grid-controls">
    <button class="grid-btn active" id="gbtn-h" title="Auto-fit"     onclick="setLayout('horizontal')">
      <svg viewBox="0 0 16 16"><rect x="0" y="1" width="4" height="14"/><rect x="6" y="1" width="4" height="14"/><rect x="12" y="1" width="4" height="14"/></svg>
    </button>
    <button class="grid-btn" id="gbtn-v"        title="Single column" onclick="setLayout('vertical')">
      <svg viewBox="0 0 16 16"><rect x="0" y="0" width="16" height="4"/><rect x="0" y="6" width="16" height="4"/><rect x="0" y="12" width="16" height="4"/></svg>
    </button>
    <button class="grid-btn" id="gbtn-2"        title="2 columns"     onclick="setLayout('grid-2')">
      <svg viewBox="0 0 16 16"><rect x="0" y="0" width="7" height="7"/><rect x="9" y="0" width="7" height="7"/><rect x="0" y="9" width="7" height="7"/><rect x="9" y="9" width="7" height="7"/></svg>
    </button>
    <button class="grid-btn" id="gbtn-3"        title="3 columns"     onclick="setLayout('grid-3')">
      <svg viewBox="0 0 16 16">
        <rect x="0" y="0" width="4" height="7"/><rect x="6" y="0" width="4" height="7"/><rect x="12" y="0" width="4" height="7"/>
        <rect x="0" y="9" width="4" height="7"/><rect x="6" y="9" width="4" height="7"/><rect x="12" y="9" width="4" height="7"/>
      </svg>
    </button>
    <button class="grid-btn" id="gbtn-4"        title="4 columns"     onclick="setLayout('grid-4')">
      <svg viewBox="0 0 16 16">
        <rect x="0"   y="0" width="3" height="7"/><rect x="4.3" y="0" width="3" height="7"/>
        <rect x="8.7" y="0" width="3" height="7"/><rect x="13"  y="0" width="3" height="7"/>
        <rect x="0"   y="9" width="3" height="7"/><rect x="4.3" y="9" width="3" height="7"/>
        <rect x="8.7" y="9" width="3" height="7"/><rect x="13"  y="9" width="3" height="7"/>
      </svg>
    </button>
  </div>

  <span class="toolbar-label">Theme</span>
  <div class="theme-switcher">
    <button id="tbtn-dark"   class="active" onclick="setTheme('dark')"  >🌙 <span>Dark</span></button>
    <button id="tbtn-light"                  onclick="setTheme('light')" >☀️ <span>Light</span></button>
    <button id="tbtn-custom"                 onclick="openBgModal()"     >🎨 <span>Custom</span></button>
  </div>

  <button class="menu-btn" onclick="toggleMenu()">⋯ Menu</button>
</div>

<!-- ── CLOCKS ── -->
<div id="clocks-wrapper">
  <div id="clocks" class="layout-horizontal"></div>
</div>

<!-- ── FLOATING MENU ── -->
<div class="float-menu" id="floatMenu">
  <div class="float-menu-backdrop" onclick="closeMenu()"></div>
  <div class="float-menu-panel">

    <div class="menu-section">
      <div class="menu-section-title">Colours</div>
      <button class="theme-btn" onclick="openThemeColour()">🎨 Theme colour for all cards</button>
    </div>

    <div class="menu-section">
      <div class="menu-section-title">Timezones</div>
      <input class="tz-name-input" id="tzCustomName" placeholder="Custom display name (optional)" maxlength="24" />
      <div class="tz-list" id="tzList"></div>
      <button class="reset-btn" onclick="resetAll()">↺ Reset all to default</button>
    </div>

  </div>
</div>

<!-- ── CARD COLOUR MODAL ── -->
<div class="colour-modal" id="colourModal">
  <div class="colour-panel">
    <h3>Card colour</h3>
    <div class="colour-tabs">
      <button class="colour-tab active" id="tabSolid"    onclick="setColourTab('solid')">Solid</button>
      <button class="colour-tab"        id="tabGradient" onclick="setColourTab('gradient')">Gradient</button>
    </div>
    <div id="solidSection">
      <div class="colour-row">
        <label>Pick a colour</label>
        <input type="color" id="solidColour" value="#0f3460" oninput="updatePreview()" />
      </div>
    </div>
    <div id="gradientSection" style="display:none">
      <div class="colour-row">
        <label>From</label><input type="color" id="gradFrom" value="#0f3460" oninput="updatePreview()" />
        <label>To</label>  <input type="color" id="gradTo"   value="#e94560" oninput="updatePreview()" />
      </div>
      <div class="colour-row" style="flex-direction:column;align-items:flex-start;gap:6px">
        <label>Direction</label>
        <div class="direction-btns">
          <button class="dir-btn active" data-dir="to right"        onclick="setDir(this,'to right')">→</button>
          <button class="dir-btn"        data-dir="to bottom"       onclick="setDir(this,'to bottom')">↓</button>
          <button class="dir-btn"        data-dir="to bottom right" onclick="setDir(this,'to bottom right')">↘</button>
          <button class="dir-btn"        data-dir="to bottom left"  onclick="setDir(this,'to bottom left')">↙</button>
        </div>
      </div>
    </div>
    <div class="colour-preview" id="colourPreview"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeColour()">Cancel</button>
      <button class="btn-apply"  onclick="applyColour()">Apply</button>
    </div>
  </div>
</div>

<!-- ── CUSTOM BG MODAL ── -->
<div class="bg-modal" id="bgModal">
  <div class="bg-panel">
    <h3>🎨 Custom Background</h3>
    <p>Choose a background colour for the entire app. Cards and panels adapt automatically.</p>
    <div class="bg-presets" id="bgPresets"></div>
    <div class="bg-custom-row">
      <label>Pick any colour</label>
      <input type="color" id="bgCustomColour" value="#1a1a2e" oninput="bgPickerChange()" />
    </div>
    <div class="bg-live-preview" id="bgLivePreview">Preview</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeBgModal()">Cancel</button>
      <button class="btn-apply"  onclick="applyCustomBg()">Apply</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast">✓ Saved</div>

<script>
// ═══════════════ STATE ═══════════════

const DEFAULT_ZONES = [
  {city:'Bangalore',tz:'Asia/Kolkata',     badge:'IST',home:true },
  {city:'Dubai',    tz:'Asia/Dubai',       badge:'GST',home:false},
  {city:'UTC',      tz:'UTC',              badge:'UTC',home:false},
  {city:'São Paulo',tz:'America/Sao_Paulo',badge:'BRT',home:false},
  {city:'Chicago',  tz:'America/Chicago',  badge:'CDT',home:false},
];

const ALL_ZONES = [
  {city:'New York',    tz:'America/New_York',    badge:'EST'},
  {city:'Los Angeles', tz:'America/Los_Angeles', badge:'PST'},
  {city:'Chicago',     tz:'America/Chicago',     badge:'CDT'},
  {city:'São Paulo',   tz:'America/Sao_Paulo',   badge:'BRT'},
  {city:'London',      tz:'Europe/London',       badge:'GMT'},
  {city:'Paris',       tz:'Europe/Paris',        badge:'CET'},
  {city:'Berlin',      tz:'Europe/Berlin',       badge:'CET'},
  {city:'Moscow',      tz:'Europe/Moscow',       badge:'MSK'},
  {city:'Dubai',       tz:'Asia/Dubai',          badge:'GST'},
  {city:'Bangalore',   tz:'Asia/Kolkata',        badge:'IST'},
  {city:'Mumbai',      tz:'Asia/Kolkata',        badge:'IST'},
  {city:'Delhi',       tz:'Asia/Kolkata',        badge:'IST'},
  {city:'Colombo',     tz:'Asia/Colombo',        badge:'SLST'},
  {city:'Dhaka',       tz:'Asia/Dhaka',          badge:'BST'},
  {city:'Bangkok',     tz:'Asia/Bangkok',        badge:'ICT'},
  {city:'Singapore',   tz:'Asia/Singapore',      badge:'SGT'},
  {city:'Hong Kong',   tz:'Asia/Hong_Kong',      badge:'HKT'},
  {city:'Shanghai',    tz:'Asia/Shanghai',       badge:'CST'},
  {city:'Tokyo',       tz:'Asia/Tokyo',          badge:'JST'},
  {city:'Seoul',       tz:'Asia/Seoul',          badge:'KST'},
  {city:'Sydney',      tz:'Australia/Sydney',    badge:'AEDT'},
  {city:'Auckland',    tz:'Pacific/Auckland',    badge:'NZDT'},
  {city:'Honolulu',    tz:'Pacific/Honolulu',    badge:'HST'},
  {city:'Nairobi',     tz:'Africa/Nairobi',      badge:'EAT'},
  {city:'Lagos',       tz:'Africa/Lagos',        badge:'WAT'},
  {city:'Cairo',       tz:'Africa/Cairo',        badge:'EET'},
  {city:'Johannesburg',tz:'Africa/Johannesburg', badge:'SAST'},
  {city:'Karachi',     tz:'Asia/Karachi',        badge:'PKT'},
  {city:'Riyadh',      tz:'Asia/Riyadh',         badge:'AST'},
  {city:'UTC',         tz:'UTC',                 badge:'UTC'},
];

const BG_PRESETS = [
  {hex:'#1a1a2e',label:'Midnight'}, {hex:'#0d1b2a',label:'Abyss'},
  {hex:'#1b2838',label:'Steam'},    {hex:'#0a0a0a',label:'Pitch'},
  {hex:'#1c1c1e',label:'Carbon'},   {hex:'#1e3a2f',label:'Forest'},
  {hex:'#1a1a3e',label:'Indigo'},   {hex:'#2d1b4e',label:'Plum'},
  {hex:'#2b1d0e',label:'Walnut'},   {hex:'#0e2040',label:'Ocean'},
  {hex:'#3a2020',label:'Crimson'},  {hex:'#1e2d1e',label:'Moss'},
];

let state = {
  layout:'horizontal', format:24,
  theme:'dark', customBg:'#1a1a2e',
  zones: DEFAULT_ZONES.map(z=>({...z,visible:true,colour:null,nickname:''})),
};

// ═══════════════ PERSIST ═══════════════

function save(){
  try{ localStorage.setItem('wc3',JSON.stringify(state)); }catch(e){}
  showToast();
}

function load(){
  try{
    const r=localStorage.getItem('wc3');
    if(r){ const p=JSON.parse(r); state={...state,...p}; }
  }catch(e){}
}

// ═══════════════ TOAST ═══════════════

let _tt;
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove('show'),1800);
}

// ═══════════════ LAYOUT ═══════════════

function setLayout(m){ state.layout=m; applyLayout(); save(); }

function applyLayout(){
  const c=document.getElementById('clocks');
  c.className='layout-'+state.layout;
  const map={h:'horizontal',v:'vertical','2':'grid-2','3':'grid-3','4':'grid-4'};
  Object.entries(map).forEach(([k,v])=>
    document.getElementById('gbtn-'+k)?.classList.toggle('active',state.layout===v));
}

// ═══════════════ FORMAT ═══════════════

function setFormat(f){
  state.format=f;
  document.getElementById('btn-24h').classList.toggle('active',f===24);
  document.getElementById('btn-12h').classList.toggle('active',f===12);
  save();
}

// ═══════════════ THEME ═══════════════

function setTheme(name){ state.theme=name; applyTheme(); save(); }

function lightenHex(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,(n>>16)+amt);
  const g=Math.min(255,((n>>8)&0xff)+amt);
  const b=Math.min(255,(n&0xff)+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function applyTheme(){
  const h=document.documentElement;
  h.setAttribute('data-theme',state.theme);

  if(state.theme==='custom'){
    const bg=state.customBg;
    h.style.setProperty('--bg',bg);
    h.style.setProperty('--bg2',lightenHex(bg,8));
    h.style.setProperty('--card',lightenHex(bg,16));
    document.getElementById('metaThemeColor').content=bg;
  } else {
    h.style.removeProperty('--bg');
    h.style.removeProperty('--bg2');
    h.style.removeProperty('--card');
    document.getElementById('metaThemeColor').content=
      state.theme==='light'?'#f0f4f8':'#1a1a2e';
  }

  document.getElementById('tbtn-dark').classList.toggle('active',  state.theme==='dark');
  document.getElementById('tbtn-light').classList.toggle('active', state.theme==='light');
  document.getElementById('tbtn-custom').classList.toggle('active',state.theme==='custom');
}

// ═══════════════ CUSTOM BG MODAL ═══════════════

let _pendingBg='#1a1a2e';

function openBgModal(){
  _pendingBg=state.customBg;
  document.getElementById('bgCustomColour').value=_pendingBg;
  renderBgPresets();
  updateBgPreview(_pendingBg);
  document.getElementById('bgModal').classList.add('open');
}

function closeBgModal(){ document.getElementById('bgModal').classList.remove('open'); }

function renderBgPresets(){
  const c=document.getElementById('bgPresets');
  c.innerHTML='';
  BG_PRESETS.forEach(p=>{
    const b=document.createElement('button');
    b.className='bg-preset'+(p.hex===_pendingBg?' selected':'');
    b.style.background=p.hex; b.title=p.label;
    b.onclick=()=>{ _pendingBg=p.hex; document.getElementById('bgCustomColour').value=p.hex; updateBgPreview(p.hex); renderBgPresets(); };
    c.appendChild(b);
  });
}

function bgPickerChange(){
  _pendingBg=document.getElementById('bgCustomColour').value;
  updateBgPreview(_pendingBg); renderBgPresets();
}

function updateBgPreview(hex){
  document.getElementById('bgLivePreview').style.background=
    `linear-gradient(to right, ${hex} 30%, ${lightenHex(hex,20)})`;
}

function applyCustomBg(){
  state.customBg=_pendingBg; state.theme='custom';
  applyTheme(); closeBgModal(); save();
}

// ═══════════════ TIME HELPERS ═══════════════

function isDaytime(tz){
  const h=parseInt(new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'2-digit',hour12:false}).format(new Date()));
  return h>=6&&h<20;
}

function getUTCOffset(tz){
  const s=new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'shortOffset'}).format(new Date());
  const m=s.match(/GMT([+-]\d+(?::\d+)?)/i);
  return m?'UTC'+m[1]:'UTC+0';
}

// ═══════════════ RENDER ═══════════════

function renderCards(){
  const C=document.getElementById('clocks');
  C.innerHTML='';
  state.zones.forEach((z,i)=>C.appendChild(buildCard(z,i)));
  applyLayout(); setupDrag();
}

function buildCard(z,i){
  const div=document.createElement('div');
  div.className='clock-card'+(z.home?' home-card':'')+(!z.visible?' hidden-card':'');
  div.dataset.idx=i;

  if(z.colour){
    div.style.background=z.colour.type==='solid'
      ?z.colour.value
      :`linear-gradient(${z.colour.dir},${z.colour.from},${z.colour.to})`;
  }

  // day icon
  const icon=document.createElement('div');
  icon.className='day-icon'; icon.id='dayicon-'+i;
  div.appendChild(icon);

  // top row
  const top=document.createElement('div'); top.className='card-top';
  const cr=document.createElement('div'); cr.className='city-row';
  cr.innerHTML=`<span class="city-name">${z.city}</span>
                <span class="tz-badge">${z.badge}</span>
                ${z.home?'<span class="home-star">★</span>':''}`;
  top.appendChild(cr);

  const acts=document.createElement('div'); acts.className='card-actions';

  const pal=document.createElement('button');
  pal.className='icon-btn'; pal.title='Card colour'; pal.textContent='🎨';
  pal.onclick=()=>openColour(i); acts.appendChild(pal);

  const eye=document.createElement('button');
  eye.className='icon-btn'; eye.title=z.visible?'Hide':'Show';
  eye.textContent=z.visible?'👁':'🙈'; eye.onclick=()=>toggleVisible(i);
  acts.appendChild(eye);

  if(!z.home){
    const rm=document.createElement('button');
    rm.className='icon-btn'; rm.title='Remove';
    rm.textContent='✕'; rm.style.color='#e94560';
    rm.onclick=()=>removeZone(i); acts.appendChild(rm);
  }

  top.appendChild(acts); div.appendChild(top);

  // nickname
  const nr=document.createElement('div'); nr.className='nickname-row';
  const nd=document.createElement('div'); nd.className='nickname-display'; nd.id='nd-'+i;
  nd.onclick=()=>openNickEditor(i);
  nd.innerHTML=z.nickname?`✏️ <em>${z.nickname}</em>`:`<span style="opacity:.5">✏️ Add nickname</span>`;

  const ne=document.createElement('div'); ne.className='nickname-editor'; ne.id='ne-'+i;
  const ni=document.createElement('input');
  ni.maxLength=20; ni.value=z.nickname||''; ni.placeholder='Nickname…';
  const nc_el=document.createElement('span'); nc_el.className='nick-char-count';
  nc_el.textContent=(z.nickname||'').length+'/20';
  ni.oninput=()=>{ const v=ni.value.replace(/[^a-zA-Z0-9\-_]/g,''); ni.value=v; nc_el.textContent=v.length+'/20'; };
  ni.onkeydown=e=>{ if(e.key==='Enter') saveNick(i,ni.value); if(e.key==='Escape') closeNickEditor(i); };

  const ns=document.createElement('button'); ns.className='nick-save'; ns.textContent='Save';
  ns.onclick=()=>saveNick(i,ni.value);
  const ncan=document.createElement('button'); ncan.className='nick-cancel'; ncan.textContent='Cancel';
  ncan.onclick=()=>closeNickEditor(i);

  ne.append(ni,nc_el,ns,ncan); nr.append(nd,ne); div.appendChild(nr);

  // time
  const te=document.createElement('div'); te.className='time-display'; te.id='time-'+i;
  const de=document.createElement('div'); de.className='date-display'; de.id='date-'+i;
  const oe=document.createElement('div'); oe.className='utc-offset'; oe.textContent=getUTCOffset(z.tz);
  div.append(te,de,oe);
  return div;
}

// ═══════════════ TICK ═══════════════

function tick(){
  const now=new Date();
  state.zones.forEach((z,i)=>{
    const te=document.getElementById('time-'+i);
    const de=document.getElementById('date-'+i);
    const ie=document.getElementById('dayicon-'+i);
    if(!te) return;

    if(state.format===12){
      const s=new Intl.DateTimeFormat('en-US',{timeZone:z.tz,hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true}).format(now);
      const [t,ap]=s.split(' ');
      te.innerHTML=`${t}<span class="ampm">${ap}</span>`;
    } else {
      te.textContent=new Intl.DateTimeFormat('en-GB',{timeZone:z.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(now);
    }

    de.textContent=new Intl.DateTimeFormat('en-GB',{timeZone:z.tz,weekday:'short',day:'numeric',month:'short'}).format(now);
    if(ie) ie.textContent=isDaytime(z.tz)?'☀️':'🌙';
  });
}

// ═══════════════ ACTIONS ═══════════════

function toggleVisible(i){ state.zones[i].visible=!state.zones[i].visible; save(); renderCards(); }
function removeZone(i)    { state.zones.splice(i,1); save(); renderCards(); }

function openNickEditor(i) { document.getElementById('nd-'+i).style.display='none'; document.getElementById('ne-'+i).classList.add('open'); }
function closeNickEditor(i){ document.getElementById('nd-'+i).style.display='';     document.getElementById('ne-'+i).classList.remove('open'); }
function saveNick(i,val)   { state.zones[i].nickname=val.trim(); save(); renderCards(); }

// card colour
let _ct=null, _ctab='solid', _gdir='to right';

function openColour(idx){
  _ct=idx; setColourTab('solid');
  const ex=state.zones[idx]?.colour;
  if(ex?.type==='gradient'){
    setColourTab('gradient');
    document.getElementById('gradFrom').value=ex.from;
    document.getElementById('gradTo').value=ex.to;
    _gdir=ex.dir;
    document.querySelectorAll('.dir-btn').forEach(b=>b.classList.toggle('active',b.dataset.dir===_gdir));
  } else if(ex?.type==='solid'){
    document.getElementById('solidColour').value=ex.value;
  }
  updatePreview();
  document.getElementById('colourModal').classList.add('open');
}

function openThemeColour(){ _ct='theme'; setColourTab('solid'); updatePreview(); document.getElementById('colourModal').classList.add('open'); }
function closeColour(){ document.getElementById('colourModal').classList.remove('open'); }

function setColourTab(tab){
  _ctab=tab;
  document.getElementById('tabSolid').classList.toggle('active',   tab==='solid');
  document.getElementById('tabGradient').classList.toggle('active',tab==='gradient');
  document.getElementById('solidSection').style.display   =tab==='solid'   ?'':'none';
  document.getElementById('gradientSection').style.display=tab==='gradient'?'':'none';
  updatePreview();
}

function setDir(btn,dir){
  _gdir=dir;
  document.querySelectorAll('.dir-btn').forEach(b=>b.classList.toggle('active',b===btn));
  updatePreview();
}

function updatePreview(){
  document.getElementById('colourPreview').style.background=_ctab==='solid'
    ?document.getElementById('solidColour').value
    :`linear-gradient(${_gdir},${document.getElementById('gradFrom').value},${document.getElementById('gradTo').value})`;
}

function applyColour(){
  const colour=_ctab==='solid'
    ?{type:'solid',value:document.getElementById('solidColour').value}
    :{type:'gradient',from:document.getElementById('gradFrom').value,to:document.getElementById('gradTo').value,dir:_gdir};
  if(_ct==='theme') state.zones.forEach(z=>z.colour=JSON.parse(JSON.stringify(colour)));
  else state.zones[_ct].colour=colour;
  closeColour(); save(); renderCards();
}

// menu / tz management
function toggleMenu(){
  const m=document.getElementById('floatMenu');
  m.classList.toggle('open');
  if(m.classList.contains('open')) buildTZList();
}

function closeMenu(){ document.getElementById('floatMenu').classList.remove('open'); }

function buildTZList(){
  const list=document.getElementById('tzList');
  list.innerHTML='';
  const ex=new Set(state.zones.map(z=>z.tz));
  ALL_ZONES.forEach(z=>{
    const item=document.createElement('div'); item.className='tz-item';
    const already=ex.has(z.tz);
    item.innerHTML=`<span>${z.city} <span style="color:var(--muted);font-size:.72rem">${z.badge}</span></span><span class="add-mark">${already?'✓':'+'}</span>`;
    if(!already) item.onclick=()=>addZone(z);
    list.appendChild(item);
  });
}

function addZone(z){
  if(state.zones.length>=10){alert('Max 10 timezones.');return;}
  const n=document.getElementById('tzCustomName').value.trim();
  state.zones.push({city:z.city,tz:z.tz,badge:z.badge,home:false,visible:true,colour:null,nickname:n||''});
  document.getElementById('tzCustomName').value='';
  save(); renderCards(); buildTZList();
}

function resetAll(){
  if(!confirm('Reset all to default?')) return;
  state.zones=DEFAULT_ZONES.map(z=>({...z,visible:true,colour:null,nickname:''}));
  state.layout='horizontal'; state.format=24; state.theme='dark'; state.customBg='#1a1a2e';
  applyTheme(); applyLayout(); setFormat(24); save(); renderCards(); closeMenu();
}

// drag & drop
function setupDrag(){
  let dragged=null;
  document.querySelectorAll('.clock-card').forEach(card=>{
    card.draggable=true;
    card.addEventListener('dragstart',()=>{dragged=card;setTimeout(()=>card.classList.add('dragging'),0);});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragged=null;});
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      if(dragged&&dragged!==card){
        const all=[...document.querySelectorAll('.clock-card')];
        const from=all.indexOf(dragged),to=all.indexOf(card);
        if(from!==-1&&to!==-1){
          state.zones.splice(to,0,state.zones.splice(from,1)[0]);
          renderCards(); save();
        }
      }
    });
  });
}

// ═══════════════ INIT ═══════════════
load();
applyTheme();
setFormat(state.format);
applyLayout();
renderCards();
tick();
setInterval(tick,1000);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
