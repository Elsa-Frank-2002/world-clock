<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="World Clock" />
  <meta name="description" content="A personal world clock — track up to 5 timezones with custom colours, nicknames and layouts." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>World Clock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 1rem 1.25rem 2rem; max-width: 900px; margin: 0 auto; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0 1rem; }
    .topbar-title { font-size: 17px; font-weight: 500; color: #1a1a1a; }
    .menu-wrap { position: relative; }
    .menu-btn { background: none; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; padding: 6px 11px; color: #1a1a1a; display: flex; align-items: center; gap: 3px; }
    .menu-btn:hover { background: #ebebeb; }
    .menu-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; display: inline-block; }
    .dropdown { position: absolute; right: 0; top: calc(100% + 6px); background: #fff; border: 0.5px solid #ddd; border-radius: 12px; min-width: 215px; z-index: 999; display: none; padding: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .dropdown.open { display: block; }
    .dd-section { font-size: 11px; color: #aaa; padding: 6px 8px 3px; text-transform: uppercase; letter-spacing: 0.05em; }
    .dd-sep { height: 0.5px; background: #eee; margin: 4px 0; }
    .dd-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 8px; gap: 8px; }
    .dd-row span { font-size: 13px; color: #1a1a1a; }
    .toggle-wrap { display: flex; border: 0.5px solid #ccc; border-radius: 8px; overflow: hidden; }
    .toggle-wrap button { font-size: 12px; padding: 3px 10px; border: none; background: transparent; color: #888; cursor: pointer; }
    .toggle-wrap button.active { background: #dbeafe; color: #1e40af; }
    .dd-btn { width: 100%; text-align: left; font-size: 13px; padding: 7px 8px; border-radius: 8px; border: none; background: transparent; color: #1a1a1a; cursor: pointer; }
    .dd-btn:hover { background: #f5f5f3; }
    .dd-btn.danger { color: #dc2626; }

    .clock-container { display: grid; gap: 10px; }
    .clock-container.horizontal { grid-template-columns: repeat(auto-fit, minmax(165px, 1fr)); }
    .clock-container.vertical { grid-template-columns: 1fr; }

    .clock-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 10px 12px; cursor: grab; user-select: none; }
    .clock-card.home { border: 2px solid #93c5fd; }
    .clock-card.dragging { opacity: 0.35; }
    .clock-card.drag-over { border-color: #93c5fd; border-style: dashed; }
    .clock-card.hidden-card { opacity: 0.45; }
    .clock-card.vertical-square { width: 100%; aspect-ratio: 1/1; max-width: 200px; }

    .card-actions { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .spacer { flex: 1; }
    .btn-icon { background: none; border: none; cursor: pointer; padding: 0; line-height: 1; display: flex; align-items: center; color: #bbb; }
    .btn-icon:hover { color: #333; }

    .city-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; flex-wrap: wrap; }
    .city-label { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .tz-badge { font-size: 11px; padding: 1px 6px; border-radius: 6px; background: rgba(0,0,0,0.07); color: #666; }

    .nickname-display { font-size: 11px; color: #888; font-style: italic; cursor: pointer; padding: 2px 3px; border-radius: 4px; border: 0.5px dashed transparent; margin-bottom: 4px; display: inline-block; min-width: 60px; }
    .nickname-display:hover { border-color: #ccc; }
    .nickname-display.empty { color: #bbb; }
    .nickname-editor { margin-bottom: 5px; display: none; }
    .nickname-editor.open { display: block; }
    .nickname-input { font-size: 12px; width: 100%; padding: 4px 7px; border: 0.5px solid #93c5fd; border-radius: 8px; background: #f0f7ff; color: #1a1a1a; outline: none; font-family: inherit; }
    .nickname-hint { font-size: 10px; color: #aaa; display: flex; justify-content: space-between; margin: 2px 0 4px; }
    .nickname-actions { display: flex; gap: 5px; }
    .nickname-actions button { flex: 1; font-size: 11px; padding: 3px 0; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #1a1a1a; cursor: pointer; }
    .nickname-actions button.ok { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }

    .clock-time-wrap { display: flex; align-items: baseline; gap: 3px; }
    .clock-time { font-size: 24px; font-weight: 500; color: #1a1a1a; letter-spacing: -0.5px; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .clock-ampm { font-size: 10px; font-weight: 500; color: #888; }
    .clock-date { font-size: 11px; color: #666; margin: 2px 0 0; }
    .clock-meta { font-size: 11px; color: #999; margin: 4px 0 0; display: flex; align-items: center; gap: 4px; }
    .hidden-label { font-size: 11px; color: #aaa; margin: 2px 0 0; }

    .color-panel { position: fixed; z-index: 1000; background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 14px; min-width: 220px; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .color-panel.open { display: block; }
    .color-panel h4 { font-size: 13px; font-weight: 500; margin: 0 0 10px; color: #1a1a1a; }
    .color-panel label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    .color-panel input[type=color] { width: 100%; height: 32px; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; padding: 2px; background: none; margin-bottom: 10px; }
    .tab-row { display: flex; margin-bottom: 12px; border: 0.5px solid #ccc; border-radius: 8px; overflow: hidden; }
    .tab-row button { flex: 1; font-size: 12px; padding: 5px; border: none; background: transparent; color: #888; cursor: pointer; }
    .tab-row button.active { background: #dbeafe; color: #1e40af; }
    .gradient-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .gradient-row input[type=color] { flex: 1; height: 32px; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; padding: 2px; background: none; margin: 0; }
    .gradient-preview { height: 20px; border-radius: 8px; margin-bottom: 10px; border: 0.5px solid #e0e0e0; }
    .gradient-dir { display: flex; gap: 6px; margin-bottom: 10px; }
    .gradient-dir button { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 0.5px solid #ccc; background: transparent; color: #888; cursor: pointer; }
    .gradient-dir button.active { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
    .panel-row { display: flex; gap: 8px; }
    .panel-row button { flex: 1; font-size: 12px; padding: 6px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #1a1a1a; cursor: pointer; }
    .panel-row button.primary { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }

    .add-panel { margin-top: 1rem; padding: 1rem; border: 0.5px solid #e0e0e0; border-radius: 12px; background: #f5f5f3; display: none; }
    .add-panel.open { display: block; }
    .add-panel select, .add-panel input[type=text] { width: 100%; margin-bottom: 8px; font-size: 14px; padding: 7px 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; }
    .add-panel .row { display: flex; gap: 8px; }
    .add-panel .row button { flex: 1; font-size: 13px; padding: 7px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #1a1a1a; cursor: pointer; }
    .add-panel .row button.primary { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }

    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
    .footer-text { font-size: 11px; color: #aaa; }
    .saved-toast { font-size: 11px; color: #16a34a; opacity: 0; transition: opacity 0.4s; }
    .saved-toast.show { opacity: 1; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
      .topbar-title { color: #f0f0f0; }
      .menu-btn { border-color: #444; color: #f0f0f0; }
      .menu-btn:hover { background: #2a2a2a; }
      .dropdown { background: #2a2a2a; border-color: #444; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
      .dd-row span, .dd-btn { color: #f0f0f0; }
      .dd-btn:hover { background: #333; }
      .dd-btn.danger { color: #f87171; }
      .dd-sep { background: #333; }
      .toggle-wrap { border-color: #555; }
      .toggle-wrap button { color: #aaa; }
      .toggle-wrap button.active { background: #1e3a5f; color: #93c5fd; }
      .clock-card { background: #2a2a2a; border-color: #3a3a3a; }
      .clock-card.home { border-color: #3b82f6; }
      .city-label, .clock-time { color: #f0f0f0; }
      .tz-badge { background: rgba(255,255,255,0.1); color: #aaa; }
      .clock-date { color: #aaa; }
      .clock-meta, .hidden-label { color: #777; }
      .btn-icon { color: #555; }
      .btn-icon:hover { color: #f0f0f0; }
      .nickname-display { color: #777; }
      .nickname-display.empty { color: #555; }
      .nickname-display:hover { border-color: #555; }
      .nickname-input { background: #1e2d3d; border-color: #3b82f6; color: #f0f0f0; }
      .nickname-actions button { border-color: #555; color: #f0f0f0; }
      .nickname-actions button.ok { background: #1e3a5f; color: #93c5fd; border-color: #3b82f6; }
      .nickname-hint { color: #666; }
      .color-panel { background: #2a2a2a; border-color: #444; }
      .color-panel h4 { color: #f0f0f0; }
      .color-panel label { color: #aaa; }
      .tab-row { border-color: #555; }
      .tab-row button { color: #aaa; }
      .tab-row button.active, .gradient-dir button.active, .panel-row button.primary, .add-panel .row button.primary { background: #1e3a5f; color: #93c5fd; border-color: #3b82f6; }
      .gradient-dir button, .panel-row button { border-color: #555; color: #f0f0f0; }
      .add-panel { background: #222; border-color: #3a3a3a; }
      .add-panel select, .add-panel input[type=text] { background: #2a2a2a; color: #f0f0f0; border-color: #444; }
      .add-panel .row button { border-color: #555; color: #f0f0f0; }
      .footer-text { color: #666; }
    }

    @media (max-width: 480px) {
      body { padding: 0.75rem 1rem 2rem; }
      .clock-container.horizontal { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">World Clock</span>
  <div class="menu-wrap">
    <button class="menu-btn" onclick="toggleMenu(event)" aria-label="Options">
      <span class="menu-dot"></span><span class="menu-dot"></span><span class="menu-dot"></span>
    </button>
    <div class="dropdown" id="dropdown">
      <div class="dd-section">Layout</div>
      <div class="dd-row">
        <span>Orientation</span>
        <div class="toggle-wrap">
          <button id="btnH" class="active" onclick="setLayout('horizontal');event.stopPropagation()">H</button>
          <button id="btnV" onclick="setLayout('vertical');event.stopPropagation()">V</button>
        </div>
      </div>
      <div class="dd-row">
        <span>Clock format</span>
        <div class="toggle-wrap">
          <button id="btn24" class="active" onclick="setClock(false);event.stopPropagation()">24h</button>
          <button id="btn12" onclick="setClock(true);event.stopPropagation()">12h</button>
        </div>
      </div>
      <div class="dd-sep"></div>
      <div class="dd-section">Colours</div>
      <button class="dd-btn" onclick="openColorPanel(-1,event)">🎨 Theme for all cards</button>
      <div class="dd-sep"></div>
      <div class="dd-section">Timezones</div>
      <button class="dd-btn" onclick="toggleAdd();closeMenu()">+ Add a timezone</button>
      <div class="dd-sep"></div>
      <button class="dd-btn danger" onclick="resetAll()">↺ Reset all to default</button>
    </div>
  </div>
</div>

<div class="clock-container horizontal" id="clockGrid"></div>

<div class="add-panel" id="addPanel">
  <select id="tzSelect"></select>
  <input type="text" id="cityInput" placeholder="Display name (e.g. New York)" />
  <div class="row">
    <button onclick="toggleAdd()">Cancel</button>
    <button class="primary" onclick="addZone()">Add</button>
  </div>
</div>

<div class="footer">
  <span class="footer-text" id="footerText"></span>
  <span class="saved-toast" id="savedToast">✓ Saved</span>
</div>

<div class="color-panel" id="colorPanel">
  <h4 id="panelTitle">Card colour</h4>
  <div class="tab-row">
    <button id="tabSolid" class="active" onclick="setTab('solid')">Solid</button>
    <button id="tabGrad" onclick="setTab('gradient')">Gradient</button>
  </div>
  <div id="solidSection">
    <label>Pick a colour</label>
    <input type="color" id="solidColor" value="#ffffff">
  </div>
  <div id="gradSection" style="display:none">
    <label>From → To</label>
    <div class="gradient-row">
      <input type="color" id="gradFrom" value="#B5D4F4" oninput="updateGradPreview()">
      <input type="color" id="gradTo" value="#EEEDFE" oninput="updateGradPreview()">
    </div>
    <div class="gradient-preview" id="gradPreview"></div>
    <label>Direction</label>
    <div class="gradient-dir">
      <button class="active" onclick="setDir('to right',this)">→</button>
      <button onclick="setDir('to bottom',this)">↓</button>
      <button onclick="setDir('to bottom right',this)">↘</button>
      <button onclick="setDir('to bottom left',this)">↙</button>
    </div>
  </div>
  <div class="panel-row">
    <button onclick="closeColorPanel()">Cancel</button>
    <button class="primary" onclick="applyColor()">Apply</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'worldclock_v1';
const ALL_TZ = [
  ['Africa/Cairo','Cairo'],['Africa/Lagos','Lagos'],['Africa/Nairobi','Nairobi'],
  ['America/Chicago','Chicago'],['America/Los_Angeles','Los Angeles'],['America/New_York','New York'],
  ['America/Sao_Paulo','São Paulo'],['America/Toronto','Toronto'],['America/Vancouver','Vancouver'],
  ['Asia/Bangkok','Bangkok'],['Asia/Dubai','Dubai'],['Asia/Hong_Kong','Hong Kong'],
  ['Asia/Jakarta','Jakarta'],['Asia/Karachi','Karachi'],['Asia/Kolkata','Bangalore'],
  ['Asia/Kuala_Lumpur','Kuala Lumpur'],['Asia/Seoul','Seoul'],['Asia/Shanghai','Shanghai'],
  ['Asia/Singapore','Singapore'],['Asia/Tokyo','Tokyo'],['Australia/Sydney','Sydney'],
  ['Europe/Amsterdam','Amsterdam'],['Europe/Berlin','Berlin'],['Europe/Istanbul','Istanbul'],
  ['Europe/London','London'],['Europe/Moscow','Moscow'],['Europe/Paris','Paris'],
  ['Pacific/Auckland','Auckland'],['Pacific/Honolulu','Honolulu'],['UTC','UTC'],
];
const DEFAULT_ZONES = [
  {city:'Bangalore',tz:'Asia/Kolkata',label:'IST',home:true,visible:true,bg:null,nickname:''},
  {city:'Dubai',tz:'Asia/Dubai',label:'GST',home:false,visible:true,bg:null,nickname:''},
  {city:'UTC',tz:'UTC',label:'UTC',home:false,visible:true,bg:null,nickname:''},
  {city:'São Paulo',tz:'America/Sao_Paulo',label:'BRT',home:false,visible:true,bg:null,nickname:''},
  {city:'Chicago',tz:'America/Chicago',label:'CDT',home:false,visible:true,bg:null,nickname:''},
];

function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({zones,layout,use12hr}));
    const t=document.getElementById('savedToast');
    t.classList.add('show');clearTimeout(t._to);
    t._to=setTimeout(()=>t.classList.remove('show'),1500);
  }catch(e){}
}
function resetAll(){
  if(!confirm('Reset everything to default?'))return;
  localStorage.removeItem(STORAGE_KEY);
  zones=JSON.parse(JSON.stringify(DEFAULT_ZONES));
  layout='horizontal';use12hr=false;
  closeMenu();applyPrefs();buildCards();
}

let zones,layout,use12hr;
const saved=loadState();
if(saved){zones=saved.zones.map(z=>({nickname:'',...z}));layout=saved.layout||'horizontal';use12hr=saved.use12hr||false;}
else{zones=JSON.parse(JSON.stringify(DEFAULT_ZONES));layout='horizontal';use12hr=false;}

let dragSrc=null,activeCardIdx=null,gradDir='to right',currentTab='solid';

function applyPrefs(){
  document.getElementById('btnH').classList.toggle('active',layout==='horizontal');
  document.getElementById('btnV').classList.toggle('active',layout==='vertical');
  document.getElementById('btn24').classList.toggle('active',!use12hr);
  document.getElementById('btn12').classList.toggle('active',use12hr);
}
function isDaytime(tz){const h=parseInt(new Date().toLocaleString('en-US',{timeZone:tz,hour:'numeric',hour12:false}));return h>=6&&h<20;}
function getOffset(tz){
  const now=new Date();
  const diff=(new Date(now.toLocaleString('en-US',{timeZone:tz}))-new Date(now.toLocaleString('en-US',{timeZone:'UTC'})))/3600000;
  const sign=diff>=0?'+':'-';const abs=Math.abs(diff);const h=Math.floor(abs);const m=Math.round((abs-h)*60);
  return `UTC${sign}${h}${m?':'+String(m).padStart(2,'0'):''}`;
}

const sunSVG=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/></svg>`;
const moonSVG=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const eyeOnSVG=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const eyeOffSVG=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
const rmSVG=`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const palSVG=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>`;

function visibleCount(){return zones.filter(z=>z.visible).length;}
function sanitise(v){return v.replace(/[^a-zA-Z0-9_-]/g,'').slice(0,20);}

function openNicknameEditor(i){
  document.getElementById(`nn-disp-${i}`).style.display='none';
  const ed=document.getElementById(`nn-editor-${i}`);
  ed.classList.add('open');
  const inp=document.getElementById(`nn-input-${i}`);
  inp.value=zones[i].nickname||'';
  updateHint(i);
  setTimeout(()=>{inp.focus();inp.select();},20);
}
function saveNickname(i){
  zones[i].nickname=sanitise(document.getElementById(`nn-input-${i}`).value);
  saveState();closeNicknameEditor(i);
}
function closeNicknameEditor(i){
  document.getElementById(`nn-editor-${i}`).classList.remove('open');
  const disp=document.getElementById(`nn-disp-${i}`);
  disp.style.display='';
  disp.textContent=zones[i].nickname||'add a nickname…';
  disp.className='nickname-display'+(zones[i].nickname?'':' empty');
}
function updateHint(i){
  const inp=document.getElementById(`nn-input-${i}`);if(!inp)return;
  const clean=sanitise(inp.value);if(inp.value!==clean)inp.value=clean;
  const hint=document.getElementById(`nn-hint-${i}`);
  if(hint)hint.innerHTML=`<span>${20-clean.length} chars left</span><span>letters, numbers, - _</span>`;
}

function buildCards(){
  const grid=document.getElementById('clockGrid');
  grid.innerHTML='';
  grid.className='clock-container '+layout;
  zones.forEach((z,i)=>{
    const card=document.createElement('div');
    card.id=`card-${i}`;
    card.className='clock-card'+(z.home?' home':'')+(!z.visible?' hidden-card':'')+(layout==='vertical'?' vertical-square':'');
    card.draggable=true;
    if(z.bg)card.style.background=z.bg;
    card.innerHTML=`
      <div class="card-actions">
        <button class="btn-icon" title="Card colour" onclick="openColorPanel(${i},event)">${palSVG}</button>
        <div class="spacer"></div>
        <button class="btn-icon" onclick="toggleVisible(${i})">${z.visible?eyeOnSVG:eyeOffSVG}</button>
        ${z.home?'':` <button class="btn-icon" onclick="removeZone(${i})">${rmSVG}</button>`}
      </div>
      <div class="city-row">
        <p class="city-label">${z.city}${z.home?' ★':''}</p>
        <span class="tz-badge">${z.label||z.tz.split('/').pop()}</span>
      </div>
      <div id="nn-disp-${i}" class="nickname-display${z.nickname?'':' empty'}" onclick="openNicknameEditor(${i})">${z.nickname||'add a nickname…'}</div>
      <div id="nn-editor-${i}" class="nickname-editor">
        <input id="nn-input-${i}" class="nickname-input" type="text" maxlength="20" placeholder="e.g. sisters_place"
          oninput="updateHint(${i})"
          onkeydown="if(event.key==='Enter'){saveNickname(${i});event.preventDefault();}if(event.key==='Escape'){closeNicknameEditor(${i});}"
          onmousedown="event.stopPropagation()" ondragstart="event.stopPropagation()" />
        <div id="nn-hint-${i}" class="nickname-hint"><span>20 chars left</span><span>letters, numbers, - _</span></div>
        <div class="nickname-actions">
          <button onclick="closeNicknameEditor(${i})">Cancel</button>
          <button class="ok" onclick="saveNickname(${i})">Save</button>
        </div>
      </div>
      ${z.visible
        ?`<div class="clock-time-wrap" id="time-${i}"></div><p class="clock-date" id="date-${i}"></p><p class="clock-meta" id="meta-${i}"></p>`
        :`<p class="hidden-label">Hidden — click eye to show</p>`}
    `;
    card.addEventListener('dragstart',e=>{if(e.target.tagName==='INPUT'){e.preventDefault();return;}dragSrc=i;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.clock-card').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{e.preventDefault();if(dragSrc!==null&&dragSrc!==i){const mv=zones.splice(dragSrc,1)[0];zones.splice(i,0,mv);dragSrc=null;saveState();buildCards();}});
    grid.appendChild(card);
  });
  tickClocks();
}

function tickClocks(){
  const now=new Date();
  zones.forEach((z,i)=>{
    const timeEl=document.getElementById(`time-${i}`);
    const dateEl=document.getElementById(`date-${i}`);
    const metaEl=document.getElementById(`meta-${i}`);
    if(!timeEl||!z.visible)return;
    const fullTime=now.toLocaleTimeString('en-US',{timeZone:z.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:use12hr});
    let td=fullTime,ampm='';
    if(use12hr){const m=fullTime.match(/^(\d{1,2}:\d{2}:\d{2})\s*(AM|PM)$/i);if(m){td=m[1];ampm=m[2];}}
    else{td=now.toLocaleTimeString('en-GB',{timeZone:z.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}
    timeEl.innerHTML=`<span class="clock-time">${td}</span>${ampm?`<span class="clock-ampm">${ampm}</span>`:''}`;
    if(dateEl)dateEl.textContent=now.toLocaleDateString('en-GB',{timeZone:z.tz,weekday:'short',day:'numeric',month:'short'});
    if(metaEl){const day=isDaytime(z.tz);metaEl.innerHTML=`${day?sunSVG:moonSVG} ${day?'Daytime':'Night'} · ${getOffset(z.tz)}`;}
  });
  document.getElementById('footerText').textContent=`${visibleCount()} of 5 shown · ${use12hr?'12hr':'24hr'} · ${now.toLocaleTimeString()}`;
}

function toggleMenu(e){e.stopPropagation();document.getElementById('dropdown').classList.toggle('open');}
function closeMenu(){document.getElementById('dropdown').classList.remove('open');}

function openColorPanel(idx,e){
  e.stopPropagation();closeMenu();activeCardIdx=idx;
  document.getElementById('panelTitle').textContent=idx===-1?'Theme — all cards':`Colour — ${zones[idx].city}`;
  setTab('solid');updateGradPreview();
  const panel=document.getElementById('colorPanel');
  const rect=e.target.closest('button').getBoundingClientRect();
  panel.style.top=(rect.bottom+6)+'px';
  panel.style.left=Math.min(rect.left,window.innerWidth-240)+'px';
  panel.classList.add('open');
}
function closeColorPanel(){document.getElementById('colorPanel').classList.remove('open');activeCardIdx=null;}
function setTab(tab){
  currentTab=tab;
  document.getElementById('tabSolid').classList.toggle('active',tab==='solid');
  document.getElementById('tabGrad').classList.toggle('active',tab==='gradient');
  document.getElementById('solidSection').style.display=tab==='solid'?'':'none';
  document.getElementById('gradSection').style.display=tab==='gradient'?'':'none';
}
function setDir(dir,btn){gradDir=dir;document.querySelectorAll('.gradient-dir button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updateGradPreview();}
function updateGradPreview(){document.getElementById('gradPreview').style.background=`linear-gradient(${gradDir},${document.getElementById('gradFrom').value},${document.getElementById('gradTo').value})`;}
function applyColor(){
  const bg=currentTab==='solid'?document.getElementById('solidColor').value:`linear-gradient(${gradDir},${document.getElementById('gradFrom').value},${document.getElementById('gradTo').value})`;
  if(activeCardIdx===-1){zones.forEach(z=>z.bg=bg);}else if(activeCardIdx!==null){zones[activeCardIdx].bg=bg;}
  closeColorPanel();saveState();buildCards();
}

function setLayout(l){layout=l;applyPrefs();saveState();buildCards();}
function setClock(h){use12hr=h;applyPrefs();saveState();buildCards();}
function toggleVisible(i){
  if(zones[i].visible){zones[i].visible=false;}
  else{if(visibleCount()>=5){alert('Max 5 visible. Hide one first.');return;}zones[i].visible=true;}
  saveState();buildCards();
}
function removeZone(i){zones.splice(i,1);saveState();buildCards();}
function toggleAdd(){
  const p=document.getElementById('addPanel');p.classList.toggle('open');
  if(p.classList.contains('open')){
    const sel=document.getElementById('tzSelect');
    sel.innerHTML=ALL_TZ.map(([tz,city])=>`<option value="${tz}">${city} (${tz})</option>`).join('');
    sel.onchange=()=>{const m=ALL_TZ.find(([tz])=>tz===sel.value);if(m)document.getElementById('cityInput').value=m[1];};
    document.getElementById('cityInput').value=ALL_TZ[0][1];
  }
}
function addZone(){
  const tz=document.getElementById('tzSelect').value;
  const city=document.getElementById('cityInput').value.trim()||tz.split('/').pop();
  if(zones.find(z=>z.tz===tz)){alert('Already in your list.');return;}
  zones.push({city,tz,label:'',home:false,visible:visibleCount()<5,bg:null,nickname:''});
  document.getElementById('addPanel').classList.remove('open');
  saveState();buildCards();
}

document.addEventListener('click',e=>{
  const cp=document.getElementById('colorPanel');
  if(cp.classList.contains('open')&&!cp.contains(e.target))closeColorPanel();
  const dd=document.getElementById('dropdown');
  if(dd.classList.contains('open')&&!document.querySelector('.menu-wrap').contains(e.target))closeMenu();
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

applyPrefs();
buildCards();
setInterval(tickClocks,1000);
</script>
</body>
</html>
